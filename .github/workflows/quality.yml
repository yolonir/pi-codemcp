name: Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Locks, TypeScript, Python, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.13"
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Install Python
        run: uv python install 3.13

      - name: Sync locked environments
        run: just sync

      - name: Run repository hygiene hooks
        uses: j178/prek-action@v2.0.1
        env:
          # CI validates pushed main commits; quality streams in the next step.
          SKIP: no-commit-to-branch,quality
        with:
          prek-version: "0.4.8"

      - name: Run quality gate
        run: just check

  package:
    name: Package smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install just
        uses: extractions/setup-just@v3

      - name: Sync TypeScript environment
        run: just sync-typescript

      - name: Verify production package
        run: just release-check
