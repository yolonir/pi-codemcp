name: Release

on:
  workflow_run:
    workflows: [Quality]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release_please:
    name: Update release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Update release pull request or create release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Run required checks on release pull request
        if: steps.release.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          branch="$(jq -er '.headBranchName' <<<"$RELEASE_PR")"
          gh workflow run quality.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"

  publish:
    name: Publish npm package
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}

      - name: Install Node
        uses: actions/setup-node@v7
        with:
          node-version: 22.19.0
          registry-url: https://registry.npmjs.org

      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.17.0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.8.13"
          enable-cache: true
          cache-dependency-glob: sidecar/uv.lock

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install Python
        run: uv python install 3.13

      - name: Sync locked environments
        run: just sync

      - name: Publish verified package
        run: npm publish --access public --provenance
