name: Release

on:
  workflow_run:
    workflows: [Quality]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release_please:
    name: Update release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Update release pull request or create release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Run required checks on release pull request
        if: steps.release.outputs.pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          branch="$(jq -er '.headBranchName' <<<"$RELEASE_PR")"
          gh workflow run quality.yml --repo "$GITHUB_REPOSITORY" --ref "$branch"

  publish:
    name: Publish npm package
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}

      - name: Install Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.19.0
          registry-url: https://registry.npmjs.org

      - name: Install npm with trusted publishing support
        run: npm install --global npm@11.17.0

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Pack release with Bun
        id: package
        run: |
          set -euo pipefail
          bun pm pack --destination "$RUNNER_TEMP" --ignore-scripts
          tarballs=("$RUNNER_TEMP"/pi-codemcp-*.tgz)
          [[ ${#tarballs[@]} -eq 1 && -f "${tarballs[0]}" ]]
          echo "path=${tarballs[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish with trusted credentials and provenance
        run: >-
          npm publish "${{ steps.package.outputs.path }}"
          --ignore-scripts
          --access public
          --provenance
